<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LearnTrace</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      background: #f9fafb;
    }
    
    header {
      background: #111827;
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .logo {
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.025em;
    }

    .container {
      padding: 20px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #3b82f6;
    }

    button {
      padding: 10px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .user-info {
        display: none;
    }

    .status-badge {
        display: inline-flex;
        align-items: center;
        background: #ecfdf5;
        color: #047857;
        padding: 4px 8px;
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 600;
    }

    .pause-section {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #f3f4f6;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .toggle {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 20px;
    }

    .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #d1d5db;
        transition: .4s;
        border-radius: 34px;
    }

    .slider:before {
        position: absolute;
        content: "";
        height: 14px; width: 14px;
        left: 3px; bottom: 3px;
        background-color: white;
        transition: .4s;
        border-radius: 50%;
    }

    input:checked + .slider {
        background-color: #3b82f6;
    }

    input:checked + .slider:before {
        transform: translateX(20px);
    }

    .footer {
        padding: 16px;
        text-align: center;
        border-top: 1px solid #f3f4f6;
    }

    .logout-btn {
        background: transparent;
        color: #ef4444;
        font-size: 12px;
        padding: 4px;
    }

    .recent-activity {
      margin-top: 16px;
    }

    .recent-title {
      font-size: 12px;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .activity-item {
      padding: 8px;
      background: white;
      border: 1px solid #f3f4f6;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">LearnTrace</div>
  </header>

  <div class="container" id="loginView">
    <div class="auth-form">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>
      <button id="loginBtn">Sign In</button>
      <div id="errorMsg" style="color: red; font-size: 12px; display: none;">Invalid credentials</div>
    </div>
  </div>

  <div class="container" id="userView" style="display: none;">
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <div id="userName" style="font-weight: 700; font-size: 16px;">Welcome back!</div>
      <div class="status-badge" id="statusActive">✓ Tracking Active</div>
      <div class="status-badge" id="statusPaused" style="display: none; background: #fef2f2; color: #b91c1c;">⏸ Paused</div>
    </div>

    <div class="recent-activity" id="recentActivity">
      <div class="recent-title">Recent Milestones</div>
      <div id="activityList">
         <!-- Populated via JS -->
      </div>
    </div>

    <div class="pause-section">
      <span style="font-size: 14px; font-weight: 500; color: #4b5563;">Auto-tracking</span>
      <label class="toggle">
        <input type="checkbox" id="pauseToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div style="margin-top: 16px; text-align: center;">
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
